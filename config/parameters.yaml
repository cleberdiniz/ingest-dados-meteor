project:
  name: ingest-dados-meteor
  environment: dev

source:
  api:
    name: open_meteo
    base_url: "https://api.open-meteo.com/v1/forecast"
    retry: 5
    cache_seconds: 3600

location:
  name: sao_paulo
  latitude: -23.5505
  longitude: -46.6333
  timezone: "America/Sao_Paulo"

weather_variables:
  hourly:
    - temperature_2m
    - relative_humidity_2m
    - precipitation
    - wind_speed_10m

gcp:
  project_id: "ingest-dados-meteor"   
  bucket_name: "ingest-dados-meteor_project"
  credentials:
    method: "service_account_file"
    service_account_json_path: "C:/Aula/Aula+Python/secret/ingest-dados-meteor-8f2aea5b2918.json"

storage:
  raw_path: "raw/open_meteo/forecast"
  format: "parquet"

bigquery:
  dataset_bronze: "bronze_meteor"
  table_forecast_raw: "forecast_raw"

execution:
  save_raw_json: true
  save_parquet: true